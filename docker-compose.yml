services:
  riftchat:
    container_name: riftchat
    # Until we publish our own image to ghcr.io/datton/riftchat,
    # this docker-compose still pulls the upstream Reticulum MeshChat image
    # (same Python code we forked; Rift branding ships in the .deb / from-source path).
    image: ghcr.io/liamcottle/reticulum-meshchat:latest
    pull_policy: always
    restart: unless-stopped
    # Make the RiftChat web interface accessible from the host on port 8111
    ports:
      - 0.0.0.0:8111:8111
    volumes:
      - riftchat-config:/config
    # Uncomment if you have a USB device connected, such as an RNode
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0

volumes:
    riftchat-config:
